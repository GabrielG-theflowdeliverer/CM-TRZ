name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      # Quality gate: typecheck + lint, then coverage (runs the full test suite
      # once AND enforces per-package coverage thresholds).
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run coverage
