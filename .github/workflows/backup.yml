name: Offsite backup

# Belt-and-suspenders beyond Fly's on-host volume snapshots: take a verified,
# self-contained snapshot of the live database and store a copy OFF Fly (as a
# GitHub artifact). Weekly, plus on-demand via the Actions "Run workflow" button.
#
# The on-Fly database and its /data backups sit on Fly's encrypted volume. This
# artifact, by contrast, leaves that volume and lands in GitHub — so it is
# encrypted at rest with AES-256 before upload (key: the BACKUP_ENCRYPTION_KEY
# secret, held separately from the data). Decrypt with:
#   openssl enc -d -aes-256-cbc -pbkdf2 -in proxima-backup.db.enc \
#     -out proxima-backup.db -pass env:BACKUP_ENCRYPTION_KEY
# See docs/data-handling.md.
on:
  schedule:
    - cron: "17 4 * * 0" # Sundays 04:17 UTC
  workflow_dispatch: {}

jobs:
  backup:
    name: offsite db backup
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Run the online-backup CLI inside the machine (it reads CMT_DB_FILE from
      # the app env) to write one verified file to the volume.
      - name: Snapshot on the machine
        run: >
          flyctl ssh console -a change-management-tool
          -C "sh -lc 'cd /app && ./node_modules/.bin/tsx packages/server/src/online-backup.ts /data/offsite-latest.db'"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_SSH_TOKEN }}

      - name: Pull it off Fly
        run: flyctl ssh sftp get /data/offsite-latest.db proxima-backup.db -a change-management-tool
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_SSH_TOKEN }}

      # Encrypt before it leaves the runner. Fail loud rather than ever upload a
      # plaintext database if the key secret is missing.
      - name: Encrypt the off-Fly copy (AES-256)
        run: |
          if [ -z "$BACKUP_ENCRYPTION_KEY" ]; then
            echo "BACKUP_ENCRYPTION_KEY is not set — refusing to upload an unencrypted backup." >&2
            exit 1
          fi
          openssl enc -aes-256-cbc -pbkdf2 -salt \
            -in proxima-backup.db -out proxima-backup.db.enc \
            -pass env:BACKUP_ENCRYPTION_KEY
          rm -f proxima-backup.db
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}

      - name: Store as an artifact (off-Fly, encrypted)
        uses: actions/upload-artifact@v7
        with:
          name: proxima-db-backup
          path: proxima-backup.db.enc
          retention-days: 90
