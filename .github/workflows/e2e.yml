name: E2E

# Full-stack smoke of the respondent -> practitioner survey journey against the
# production server (built SPA + API on one origin). Kept SEPARATE from the
# required `check` gate: it installs a browser and boots the app, so it's slower
# and intentionally non-blocking — a signal, not a merge gate. Not named "CI",
# so it doesn't trigger the deploy workflow.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium (+ OS deps)
        run: npx playwright install --with-deps chromium
      - name: Run the survey-journey smoke
        run: npm run e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
