name: Deploy

# Auto-deploy main to Fly, but only after the CI gate passes — never ship a red
# build. Triggered by the CI workflow completing on main (not by the push
# directly), so deploy waits for typecheck + lint + coverage to go green.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: deploy
    # Only when the triggering CI run succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    concurrency: fly-deploy # never let two deploys overlap
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN }}
